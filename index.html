<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아기 태일 사주 분석기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- ── Step 1: 입력 ── -->
    <section id="step-input" class="step active">
      <header class="app-header">
        <div class="yin-yang-icon">☯</div>
        <h1>아기 태일 사주 분석기</h1>
        <p class="subtitle">출산예정일부터 최대 2주 동안의 사주팔자와<br>부모 궁합을 분석하여 최적의 출산일을 찾아드립니다</p>
      </header>

      <form id="saju-form" novalidate>
        <div class="form-grid">

          <div class="form-card due-card">
            <div class="form-card-icon">📅</div>
            <h3>출산예정일</h3>
            <div class="field-group">
              <label for="dueDate">예정일</label>
              <input type="date" id="dueDate" required />
            </div>
            <p class="hint-text">이 날부터 14일간 분석합니다</p>
          </div>

          <div class="form-card father-card">
            <div class="form-card-icon">👨</div>
            <h3>아버지 정보</h3>
            <div class="field-group">
              <label for="fatherDob">생년월일</label>
              <input type="date" id="fatherDob" required />
            </div>
            <div class="field-group">
              <label for="fatherHour">태어난 시간대 <span class="optional">(선택)</span></label>
              <select id="fatherHour">
                <option value="">모름</option>
                <option value="0">자시 (23:00~01:00)</option>
                <option value="1">축시 (01:00~03:00)</option>
                <option value="2">인시 (03:00~05:00)</option>
                <option value="3">묘시 (05:00~07:00)</option>
                <option value="4">진시 (07:00~09:00)</option>
                <option value="5">사시 (09:00~11:00)</option>
                <option value="6">오시 (11:00~13:00)</option>
                <option value="7">미시 (13:00~15:00)</option>
                <option value="8">신시 (15:00~17:00)</option>
                <option value="9">유시 (17:00~19:00)</option>
                <option value="10">술시 (19:00~21:00)</option>
                <option value="11">해시 (21:00~23:00)</option>
              </select>
            </div>
          </div>

          <div class="form-card mother-card">
            <div class="form-card-icon">👩</div>
            <h3>어머니 정보</h3>
            <div class="field-group">
              <label for="motherDob">생년월일</label>
              <input type="date" id="motherDob" required />
            </div>
            <div class="field-group">
              <label for="motherHour">태어난 시간대 <span class="optional">(선택)</span></label>
              <select id="motherHour">
                <option value="">모름</option>
                <option value="0">자시 (23:00~01:00)</option>
                <option value="1">축시 (01:00~03:00)</option>
                <option value="2">인시 (03:00~05:00)</option>
                <option value="3">묘시 (05:00~07:00)</option>
                <option value="4">진시 (07:00~09:00)</option>
                <option value="5">사시 (09:00~11:00)</option>
                <option value="6">오시 (11:00~13:00)</option>
                <option value="7">미시 (13:00~15:00)</option>
                <option value="8">신시 (15:00~17:00)</option>
                <option value="9">유시 (17:00~19:00)</option>
                <option value="10">술시 (19:00~21:00)</option>
                <option value="11">해시 (21:00~23:00)</option>
              </select>
            </div>
          </div>

        </div>

        <div id="form-error" class="form-error" style="display:none;"></div>
        <button type="submit" id="analyzeBtn" class="btn-analyze">
          <span class="btn-icon">☯</span>
          사주 분석하기
        </button>
      </form>
    </section>

    <!-- ── Step 2: 로딩 ── -->
    <section id="step-loading" class="step">
      <div class="loading-container">
        <div class="loading-symbol">☯</div>
        <p class="loading-text">사주팔자를 분석하고 있습니다...</p>
        <p class="loading-sub">168개 날짜·시간 조합을 계산 중</p>
      </div>
    </section>

    <!-- ── Step 3: 결과 요약 ── -->
    <section id="step-result" class="step">
      <div class="result-header">
        <button id="back-to-input" class="btn-back">← 다시 입력</button>
        <h2>분석 결과</h2>
        <div class="analysis-range" id="analysisRange"></div>
      </div>

      <!-- TOP 5 카드 -->
      <div class="section-title">
        <span class="gold-bar"></span>
        베스트 TOP 5
        <span class="gold-bar"></span>
      </div>
      <div id="top-list" class="top-list"></div>

      <!-- 정렬 옵션 -->
      <div class="sort-bar">
        <span class="sort-label">정렬:</span>
        <button class="sort-btn active" data-sort="total">전체 점수</button>
        <button class="sort-btn" data-sort="baby">사주 품질</button>
        <button class="sort-btn" data-sort="compat">부모 궁합</button>
      </div>

      <!-- 14일 전체 목록 -->
      <div class="section-title" style="margin-top:2rem;">
        <span class="gold-bar"></span>
        전체 날짜 순위
        <span class="gold-bar"></span>
      </div>
      <div id="full-list" class="full-list"></div>
    </section>

    <!-- ── Step 4: 날짜 상세 ── -->
    <section id="step-detail" class="step">
      <div class="detail-header">
        <button id="back-to-result" class="btn-back">← 목록으로</button>
        <h2 id="detail-title"></h2>
      </div>
      <div id="detail-saju-summary" class="detail-saju-summary"></div>
      <div class="section-title" style="margin-top:1.5rem;">
        <span class="gold-bar"></span>
        시간대별 점수 비교
        <span class="gold-bar"></span>
      </div>
      <div id="detail-hour-list" class="hour-list"></div>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
